<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
  <rect width="1000" height="560" fill="#ffffff"/>
  <text x="40" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#0b2a4a">KabQue � Module 5  How size N fills</text>
  <text x="40" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#556677">Example: supervisor requests N = 10</text>

  <!-- Example boxes -->
  <rect x="40" y="100" width="280" height="180" rx="8" fill="#fff4e5" stroke="#d97706" stroke-width="2"/>
  <text x="180" y="135" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#0b2a4a">Leftovers in batch</text>
  <text x="180" y="160" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#8a6d00">4</text>
  <text x="180" y="190" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">Unapproved from prior day(s)</text>
  <text x="180" y="220" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">Take first: min(10, 4) = 4</text>
  <text x="180" y="250" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">Get new numbers #1#4</text>

  <text x="360" y="190" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0b5cab">+</text>

  <rect x="400" y="100" width="280" height="180" rx="8" fill="#e8f6ee" stroke="#1a7a4c" stroke-width="2"/>
  <text x="540" y="135" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#0b2a4a">Waiting joiners</text>
  <text x="540" y="160" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#1a7a4c">20</text>
  <text x="540" y="190" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">Earliest arrivals first</text>
  <text x="540" y="220" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">Take next: 10  4 = 6</text>
  <text x="540" y="250" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">Get new numbers #5#10</text>

  <text x="720" y="190" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0b5cab">=</text>

  <rect x="760" y="100" width="200" height="180" rx="8" fill="#e8f1fb" stroke="#0b5cab" stroke-width="2"/>
  <text x="860" y="145" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#0b2a4a">Batch of 10</text>
  <text x="860" y="185" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">#1#4 carry</text>
  <text x="860" y="210" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">#5#10 waiting</text>
  <text x="860" y="245" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">14 still waiting</text>

  <rect x="40" y="320" width="920" height="160" rx="8" fill="#f8fafc" stroke="#ccd5dd"/>
  <text x="60" y="355" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#0b2a4a">Rules to remember</text>
  <text x="60" y="385" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">1. Leftovers always fill seats before new waiters.</text>
  <text x="60" y="410" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">2. Everyone in this notify gets a fresh contiguous number 1&N (including carry-overs).</text>
  <text x="60" y="435" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">3. If N &gt; available pool, notify the whole pool and show a shortage message.</text>
  <text x="60" y="460" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">4. Channel = email � SMS � or both (Brevo + MySMSGate).</text>

  <text x="40" y="530" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#8899aa">File: docs/diagrams/05-notify-batch-fill-example.svg</text>
</svg>
