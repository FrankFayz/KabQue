  <text x="500" y="324" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">Day check � queue # � faculty � contacts</text>
  <line x1="500" y1="336" x2="500" y2="380" stroke="#334455" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="340" y="380" width="320" height="40" rx="6" fill="#f8fafc" stroke="#ccd5dd"/>
  <text x="500" y="405" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#0b2a4a">Desk decision</text>

  <line x1="340" y1="400" x2="140" y2="470" stroke="#334455" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="500" y1="420" x2="500" y2="470" stroke="#334455" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="660" y1="400" x2="860" y2="470" stroke="#334455" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="40" y="470" width="200" height="100" rx="6" fill="#e8f6ee" stroke="#1a7a4c" stroke-width="2"/>
