  <text x="100" y="645" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">Approve/Reject: lifetime counts bump � batch positions recompact � student gone from desk lists.</text>
  <text x="100" y="668" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">No-show: status=skipped � can verify again later with same code � check-in again.</text>

  <text x="40" y="735" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#8899aa">File: docs/diagrams/06-verify-complete-flow.svg</text>
