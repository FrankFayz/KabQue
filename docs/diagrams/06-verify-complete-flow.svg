  <text x="500" y="210" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#0b2a4a">Supervisor: Confirm identity</text>
  <text x="500" y="230" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">POST /admin/verify-code/</text>
  <line x1="500" y1="241" x2="500" y2="280" stroke="#334455" stroke-width="2" marker-end="url(#arr)"/>

