  <text x="140" y="528" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">Leave live queue</text>
  <text x="140" y="546" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">Leave batch table</text>

  <rect x="400" y="470" width="200" height="100" rx="6" fill="#fde8e8" stroke="#b42318" stroke-width="2"/>
