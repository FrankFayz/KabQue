<svg xmlns="http://www.w3.org/2000/svg" width="960" height="720" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">KabQue  Student Queue Status Board flow</title>
  <desc id="desc">After joining the queue, the student sees waiting or notified status, secret code, and can return to waiting or leave.</desc>
  <rect width="960" height="720" fill="#ffffff"/>
  <text x="40" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#0b2a4a">KabQue � Module 4  Queue Status Board</text>
  <text x="40" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#556677">Student view after joining � download this SVG for slides / reports</text>

  <!-- Node styles -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334455"/>
    </marker>
  </defs>

  <!-- Boxes -->
  <rect x="340" y="100" width="280" height="56" rx="6" fill="#e8f1fb" stroke="#0b5cab" stroke-width="2"/>
  <text x="480" y="125" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#0b2a4a">Joined queue (waiting)</text>
  <text x="480" y="144" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">No day number yet � Pending</text>

  <line x1="480" y1="156" x2="480" y2="200" stroke="#334455" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="340" y="200" width="280" height="56" rx="6" fill="#fff8db" stroke="#c9a000" stroke-width="1.5"/>
  <text x="480" y="225" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#0b2a4a">Status board (live)</text>
  <text x="480" y="244" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">Polls / refresh � waiting ahead</text>

  <line x1="480" y1="256" x2="480" y2="300" stroke="#334455" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="300" y="300" width="360" height="56" rx="6" fill="#e8f6ee" stroke="#1a7a4c" stroke-width="2"/>
  <text x="480" y="325" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#0b2a4a">Supervisor notifies batch</text>
  <text x="480" y="344" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">Assigns #N � day � secret code � email/SMS</text>

  <line x1="480" y1="356" x2="480" y2="400" stroke="#334455" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="300" y="400" width="360" height="56" rx="6" fill="#e8f1fb" stroke="#0b5cab" stroke-width="2"/>
  <text x="480" y="425" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#0b2a4a">Notified / Checked in</text>
  <text x="480" y="444" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">Shows queue # � scheduled day � secret code</text>

  <!-- Branch lines -->
  <line x1="300" y1="428" x2="140" y2="428" stroke="#334455" stroke-width="2"/>
  <line x1="140" y1="428" x2="140" y2="520" stroke="#334455" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="428" x2="820" y2="428" stroke="#334455" stroke-width="2"/>
  <line x1="820" y1="428" x2="820" y2="520" stroke="#334455" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="456" x2="480" y2="520" stroke="#334455" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="40" y="520" width="200" height="70" rx="6" fill="#fff4e5" stroke="#d97706" stroke-width="1.5"/>
  <text x="140" y="548" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#0b2a4a">Return to waiting</text>
  <text x="140" y="568" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#556677">No date picker � back of line</text>

  <rect x="380" y="520" width="200" height="70" rx="6" fill="#e8f6ee" stroke="#1a7a4c" stroke-width="1.5"/>
  <text x="480" y="548" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#0b2a4a">Attend desk</text>
  <text x="480" y="568" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#556677">Show secret code � approve</text>

  <rect x="720" y="520" width="200" height="70" rx="6" fill="#fde8e8" stroke="#b42318" stroke-width="1.5"/>
  <text x="820" y="548" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#0b2a4a">Leave queue</text>
  <text x="820" y="568" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#556677">Can re-join from campus</text>

  <text x="40" y="640" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">Source: KabQue Queue System � Module 4</text>
  <text x="40" y="660" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#8899aa">File: docs/diagrams/04-queue-status-board-flow.svg</text>
</svg>
