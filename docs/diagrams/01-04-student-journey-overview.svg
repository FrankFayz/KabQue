<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">KabQue  Auth, Profile, Join, Status modules overview</title>
  <desc id="desc">First four student-facing modules as a single journey diagram.</desc>
  <rect width="960" height="520" fill="#ffffff"/>
  <text x="40" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#0b2a4a">KabQue � Student journey so far (Modules 14)</text>
  <text x="40" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#556677">Downloadable overview for discussion</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334455"/>
    </marker>
  </defs>

  <rect x="40" y="120" width="190" height="100" rx="8" fill="#e8f1fb" stroke="#0b5cab" stroke-width="2"/>
  <text x="135" y="155" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#0b2a4a">1. Auth</text>
  <text x="135" y="178" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">Reg number + password</text>
  <text x="135" y="198" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">JWT session</text>

  <line x1="230" y1="170" x2="270" y2="170" stroke="#334455" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="270" y="120" width="190" height="100" rx="8" fill="#e8f1fb" stroke="#0b5cab" stroke-width="2"/>
  <text x="365" y="155" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#0b2a4a">2. Profile</text>
  <text x="365" y="178" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">Name � contact</text>
  <text x="365" y="198" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">Faculty � programme</text>

  <line x1="460" y1="170" x2="500" y2="170" stroke="#334455" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="500" y="120" width="190" height="100" rx="8" fill="#e8f1fb" stroke="#0b5cab" stroke-width="2"/>
  <text x="595" y="155" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#0b2a4a">3. Join (GPS)</text>
  <text x="595" y="178" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">On campus check</text>
  <text x="595" y="198" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">Enter waiting line</text>

  <line x1="690" y1="170" x2="730" y2="170" stroke="#334455" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="730" y="120" width="190" height="100" rx="8" fill="#fff8db" stroke="#c9a000" stroke-width="2"/>
  <text x="825" y="155" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#0b2a4a">4. Status board</text>
  <text x="825" y="178" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">Pending � #N + code</text>
  <text x="825" y="198" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">Return / Leave</text>

  <rect x="40" y="280" width="880" height="160" rx="8" fill="#f8fafc" stroke="#ccd5dd"/>
  <text x="60" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#0b2a4a">Module 4 screen elements</text>
  <text x="60" y="350" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">" Hero: Pending or queue #N + status pill</text>
  <text x="60" y="375" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">" Grid: waiting ahead � scheduled day � reg � faculty � programme</text>
  <text x="60" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">" Secret code card (after notify) or wait for schedule note</text>
  <text x="60" y="425" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">" Actions: Return to waiting queue � Leave queue</text>

  <text x="40" y="490" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#8899aa">File: docs/diagrams/01-04-student-journey-overview.svg � Also see 04-*.svg in this folder</text>
</svg>
