<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520">
  <rect width="960" height="520" fill="#ffffff"/>
  <text x="40" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#0b2a4a">KabQue · Module 2  Student Profile</text>
  <text x="40" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#556677">Required before joining the queue</text>
  <defs><marker id="a" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#334455"/></marker></defs>
  <rect x="40" y="110" width="200" height="70" rx="6" fill="#e8f1fb" stroke="#0b5cab"/>
  <text x="140" y="140" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#0b2a4a">After signup</text>
  <text x="140" y="160" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">Reg + password only</text>
  <line x1="240" y1="145" x2="290" y2="145" stroke="#334455" stroke-width="2" marker-end="url(#a)"/>
  <rect x="290" y="100" width="380" height="90" rx="6" fill="#fff8db" stroke="#c9a000" stroke-width="2"/>
  <text x="480" y="130" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#0b2a4a">Complete profile form</text>
  <text x="480" y="152" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">Full name · email and/or phone</text>
  <text x="480" y="172" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">Faculty · programme</text>
  <line x1="670" y1="145" x2="720" y2="145" stroke="#334455" stroke-width="2" marker-end="url(#a)"/>
  <rect x="720" y="110" width="200" height="70" rx="6" fill="#e8f6ee" stroke="#1a7a4c" stroke-width="2"/>
  <text x="820" y="140" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#0b2a4a">profile_complete</text>
  <text x="820" y="160" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">Ready to join</text>
  <rect x="140" y="250" width="680" height="160" rx="8" fill="#f8fafc" stroke="#ccd5dd"/>
  <text x="160" y="290" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#0b2a4a">Completeness rule (server)</text>
  <text x="160" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">full_name + faculty + programme + (email OR phone)</text>
  <text x="160" y="350" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">Contacts must be unique across accounts · phone as E.164 (+256&)</text>
  <text x="160" y="380" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">API: POST /student/profile/ · gates Join Queue</text>
  <text x="40" y="480" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#8899aa">File: docs/diagrams/02-student-profile.svg</text>
</svg>
