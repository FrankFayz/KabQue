<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">KabQue  Queue entry statuses for the student</title>
  <desc id="desc">Statuses from waiting through desk outcomes and which student actions are available.</desc>
  <rect width="960" height="560" fill="#ffffff"/>
  <text x="40" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#0b2a4a">KabQue � Module 4  Statuses &amp; student actions</text>
  <text x="40" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#556677">What each status means and what the student can do</text>

  <!-- Status row -->
  <rect x="40" y="100" width="130" height="50" rx="6" fill="#f4f6f8" stroke="#8899aa"/>
  <text x="105" y="130" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#0b2a4a">waiting</text>

  <path d="M175 125 L205 125" stroke="#334455" stroke-width="2" marker-end="url(#a)"/>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#334455"/></marker>
  </defs>

  <rect x="210" y="100" width="130" height="50" rx="6" fill="#e8f1fb" stroke="#0b5cab" stroke-width="2"/>
  <text x="275" y="130" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#0b2a4a">notified</text>

  <path d="M345 125 L375 125" stroke="#334455" stroke-width="2" marker-end="url(#a)"/>

  <rect x="380" y="100" width="130" height="50" rx="6" fill="#e8f1fb" stroke="#0b5cab"/>
  <text x="445" y="130" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#0b2a4a">checked_in</text>

  <path d="M515 125 L545 125" stroke="#334455" stroke-width="2" marker-end="url(#a)"/>

  <rect x="550" y="90" width="120" height="36" rx="6" fill="#e8f6ee" stroke="#1a7a4c"/>
  <text x="610" y="113" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#0b2a4a">approved</text>

  <rect x="550" y="132" width="120" height="36" rx="6" fill="#fde8e8" stroke="#b42318"/>
  <text x="610" y="155" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#0b2a4a">rejected</text>

  <rect x="700" y="100" width="120" height="50" rx="6" fill="#fff4e5" stroke="#d97706"/>
  <text x="760" y="122" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#0b2a4a">skipped</text>
  <text x="760" y="140" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#556677">no-show</text>

  <path d="M640 108 L690 125" stroke="#334455" stroke-width="1.5" stroke-dasharray="4 3"/>
  <path d="M640 150 L690 125" stroke="#334455" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Table header -->
  <text x="40" y="210" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#0b2a4a">Actions available to the student</text>

  <rect x="40" y="230" width="880" height="36" fill="#0b2a4a"/>
  <text x="60" y="253" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Status</text>
  <text x="220" y="253" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Sees queue #</text>
  <text x="380" y="253" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Sees secret code</text>
  <text x="560" y="253" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Return to waiting</text>
  <text x="760" y="253" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Leave queue</text>

  <!-- rows -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#0b2a4a">
    <rect x="40" y="266" width="880" height="32" fill="#f8fafc"/>
    <text x="60" y="286">waiting</text><text x="220" y="286">No (Pending)</text><text x="380" y="286">No</text><text x="560" y="286">No</text><text x="760" y="286">Yes</text>

    <rect x="40" y="298" width="880" height="32" fill="#ffffff"/>
    <text x="60" y="318">notified</text><text x="220" y="318">Yes</text><text x="380" y="318">Yes</text><text x="560" y="318">Yes</text><text x="760" y="318">Yes</text>

    <rect x="40" y="330" width="880" height="32" fill="#f8fafc"/>
    <text x="60" y="350">checked_in</text><text x="220" y="350">Yes</text><text x="380" y="350">Yes</text><text x="560" y="350">Yes</text><text x="760" y="350">Yes</text>

    <rect x="40" y="362" width="880" height="32" fill="#ffffff"/>
    <text x="60" y="382">skipped</text><text x="220" y="382">Yes (if set)</text><text x="380" y="382">No*</text><text x="560" y="382">Yes</text><text x="760" y="382">Yes</text>

    <rect x="40" y="394" width="880" height="32" fill="#f8fafc"/>
    <text x="60" y="414">approved / rejected</text><text x="220" y="414"> (left queue)</text><text x="380" y="414"></text><text x="560" y="414">No</text><text x="760" y="414">No</text>
  </g>

  <text x="40" y="460" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">* API hides secret_code from students when status is skipped (only notified / checked_in / approved / rejected).</text>
  <text x="40" y="490" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">Return to waiting = cannot pick a date; student goes to back of waiting line until next notify.</text>
  <text x="40" y="530" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#8899aa">File: docs/diagrams/04-queue-statuses-actions.svg</text>
</svg>
