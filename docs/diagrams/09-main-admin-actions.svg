<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520">
  <rect width="1000" height="520" fill="#ffffff"/>
  <text x="40" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#0b2a4a">KabQue · Module 9  Account actions</text>
  <text x="40" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#556677">Lock vs Delete vs Approve</text>

  <rect x="40" y="100" width="300" height="280" rx="8" fill="#fff8db" stroke="#c9a000" stroke-width="2"/>
  <text x="190" y="145" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#0b2a4a">Lock / Unlock</text>
  <text x="190" y="175" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">POST /main-admin/lock-user/</text>
  <text x="60" y="220" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">Sets is_active = false</text>
  <text x="60" y="245" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">Blocks sign-in</text>
  <text x="60" y="270" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">Data kept in database</text>
  <text x="60" y="295" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">Unlock restores access</text>
  <text x="60" y="340" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#8a6d00">Reversible</text>

  <rect x="350" y="100" width="300" height="280" rx="8" fill="#fde8e8" stroke="#b42318" stroke-width="2"/>
  <text x="500" y="145" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#0b2a4a">Delete</text>
  <text x="500" y="175" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">POST /main-admin/delete-user/</text>
  <text x="370" y="220" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">Removes account forever</text>
  <text x="370" y="245" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">Queue data cleared</text>
  <text x="370" y="270" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">UI requires typing DELETE</text>
  <text x="370" y="295" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">Cannot delete self / other Main Admins</text>
  <text x="370" y="340" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#b42318">Irreversible</text>

  <rect x="660" y="100" width="300" height="280" rx="8" fill="#e8f6ee" stroke="#1a7a4c" stroke-width="2"/>
  <text x="810" y="145" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#0b2a4a">Approve supervisor</text>
  <text x="810" y="175" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#556677">POST .../approve-supervisor/</text>
  <text x="680" y="220" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">Confirms Kabale staff</text>
  <text x="680" y="245" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">Sets is_approved</text>
  <text x="680" y="270" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">Required before desk login</text>
  <text x="680" y="295" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334455">Can revoke later</text>
  <text x="680" y="340" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#1a7a4c">Staff gate only</text>

  <text x="40" y="450" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#8899aa">File: docs/diagrams/09-main-admin-actions.svg</text>
</svg>
