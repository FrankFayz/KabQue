services:
  - type: web
    name: kabque-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate --noinput && gunicorn kabque.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.3"
      - key: DJANGO_SETTINGS_MODULE
        value: kabque.settings
      # Set these in the Render dashboard (Environment) — do not commit real values
      - key: MYSMSGATE_API_KEY
        sync: false
      - key: MYSMSGATE_API_URL
        value: https://mysmsgate.net/api/v1/send
      - key: MYSMSGATE_DEVICE_ID
        sync: false
      # Optional. MySMSGate: 0 = SIM 1, 1 = SIM 2. Leave unset for auto.
      # Do NOT hardcode "1" unless the gateway phone really uses SIM 2.
      - key: MYSMSGATE_SIM_SLOT
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        value: KabQue
      - key: DATABASE_URL
        sync: false
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
